name: Build & Release MARCOntroller

# Only triggers on tags following the pattern "marcontroller-vX.Y.Z"
# This prevents accidental releases from tags meant for other parts of the monorepo
on:
  push:
    tags:
      - 'marcontroller-v*'

# Write permission is required to create GitHub Releases and upload assets
permissions:
  contents: write

jobs:

  # Creates the release exactly once and generates the changelog
  # Running this separately prevents the changelog from being duplicated
  # once per matrix job
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Create release with changelog
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

  build:
    name: Build - ${{ matrix.label }}
    runs-on: ${{ matrix.runs_on }}
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - label: linux-x86_64
            runs_on: ubuntu-latest
            bin_name: MARCOntroller
            asset_name: marcontroller-linux-x86_64

          # Linux ARM64
          - label: linux-aarch64
            runs_on: ubuntu-24.04-arm
            bin_name: MARCOntroller
            asset_name: marcontroller-linux-aarch64

          # Windows x86_64
          - label: windows-x86_64
            runs_on: windows-latest
            bin_name: MARCOntroller.exe
            asset_name: marcontroller-windows-x86_64.exe

          # Windows ARM64
          - label: windows-aarch64
            runs_on: windows-11-arm
            bin_name: MARCOntroller.exe
            asset_name: marcontroller-windows-aarch64.exe

          # macOS Intel
          - label: macos-x86_64
            runs_on: macos-15-intel
            bin_name: MARCOntroller
            asset_name: marcontroller-macos-x86_64

          # macOS ARM64
          - label: macos-aarch64
            runs_on: macos-latest
            bin_name: MARCOntroller
            asset_name: marcontroller-macos-aarch64

    steps:
      # Check out the full repository contents
      - name: Checkout code
        uses: actions/checkout@v4

      # hidapi on Linux requires system-level HID and udev libraries
      # These are not needed on Windows or macOS
      - name: Install system dependencies (Linux only)
        if: startsWith(matrix.runs_on, 'ubuntu')
        run: sudo apt-get update && sudo apt-get install -y libudev-dev libhidapi-dev

      # Install the stable Rust toolchain
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # Cache Cargo registry and build artifacts to speed up subsequent runs
      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            software/MARCOntroller/target/
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-cargo-
            ${{ runner.os }}-cargo-

      # Helpful diagnostic to verify the real runner architecture
      - name: Show runner info
        shell: bash
        run: |
          echo "runner.os=${{ runner.os }}"
          echo "runner.arch=${{ runner.arch }}"
          rustc -vV
          cargo -V

      # Build in release mode (optimized, no debug symbols)
      - name: Build
        working-directory: software/MARCOntroller
        run: cargo build --release

      # Rename the binary to include platform info before uploading
      - name: Prepare release asset
        shell: bash
        run: |
          cp software/MARCOntroller/target/release/${{ matrix.bin_name }} \
             ${{ matrix.asset_name }}

      # Upload the platform binary to the already-created release
      # generate_release_notes is intentionally omitted here to avoid duplication
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}